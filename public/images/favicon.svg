<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2b4a"/>
      <stop offset="1" stop-color="#0a1f38"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- rounded background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- ascending bar chart -->
  <g>
    <rect x="104" y="300" width="56" height="116" rx="16" fill="url(#bars)" opacity="0.55"/>
    <rect x="196" y="242" width="56" height="174" rx="16" fill="url(#bars)" opacity="0.75"/>
    <rect x="288" y="184" width="56" height="232" rx="16" fill="url(#bars)" opacity="0.9"/>
    <rect x="380" y="126" width="56" height="290" rx="16" fill="url(#bars)"/>
  </g>

  <!-- upward trend line -->
  <polyline points="120,300 224,236 328,188 424,118"
            fill="none" stroke="#e6f9f0" stroke-width="22"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- arrow head -->
  <path d="M424,118 L372,118 M424,118 L424,170"
        fill="none" stroke="#e6f9f0" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
